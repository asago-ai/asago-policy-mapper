# Mitigation action category assignments
# Categories: technical, operational, governance
#
# - technical:   Engineering deploys it (guardrails, filtering, access controls,
#                encryption, model alignment, infrastructure security)
# - operational: Ops/QA teams execute it (testing, monitoring, audits, incident
#                response, staged deployment, data governance procedures)
# - governance:  Leadership/compliance owns it (policies, oversight structures,
#                disclosure, accountability frameworks, training, user rights)

# ── Structural rules ──────────────────────────────────────────────────────
# Applied automatically by the build script based on action ID structure.

mit_groups:
  # MIT AI Risk Repository organizes 831 actions into 4 top-level groups.
  # The build script parses group comment headers in the MIT YAML to assign
  # each action to its top-level group number.
  "1": governance    # Organizational Governance (board oversight, safety frameworks, whistleblower, societal impact)
  "2": technical     # Technical & Security (model security, alignment, safety engineering, content safety)
  "3": operational   # Operational Process (testing, data governance, access management, monitoring, incident response)
  "4": governance    # Transparency & Accountability (documentation, disclosure, reporting, user rights)

nist_prefixes:
  # NIST AI RMF 600-1 actions are prefixed by their RMF function.
  GV: governance     # Govern — governance and oversight decisions
  MP: operational    # Map — risk identification and planning
  MS: operational    # Measure — monitoring and measurement
  MG: technical      # Manage — risk treatment and response (deploy countermeasures)

aiuc1_prefixes:
  # AIUC-1 requirements are organized under 6 Principles (A-F).
  # Prefix is the letter after "aiuc1-req-".
  a: technical       # Data & Privacy — input/output data controls, PII handling
  b: technical       # Security — access controls, adversarial testing, jailbreak defense
  c: operational     # Safety — content filtering, harm prevention, guardrails
  d: operational     # Reliability — performance monitoring, error handling, fallbacks
  e: governance      # Accountability — audit trails, decision documentation, governance
  f: governance      # Society — bias assessment, environmental impact, societal effects

# ── Explicit action assignments ───────────────────────────────────────────
# For sources without structural category signals (OWASP, Credo).

