name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8 ( longer publishes major/minor tags — SHA pinning is the only supported approach)
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff format --check src/ tests/
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/asago_policy_mapper/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8 ( longer publishes major/minor tags — SHA pinning is the only supported approach)
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run pytest -rs -m "not slow"

  test-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8 ( longer publishes major/minor tags — SHA pinning is the only supported approach)
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run pytest -rs -m slow

  test-llm-ollama:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Pull model
        run: ollama pull gemma3:1b
      - name: Run LLM integration tests
        env:
          LLM_BASE_URL: "http://localhost:11434/v1"
          LLM_MODEL: "gemma3:1b"
        run: uv run pytest --test-llm -m llm -v --timeout=120

  test-llm-vllm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: Cache HuggingFace models
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/huggingface
          key: hf-gemma3-1b-w8a8
      - name: Start vLLM-CPU server
        run: |
          docker run --rm --detach \
            --name vllm-server \
            --shm-size=4g \
            -p 8000:8000 \
            -v ~/.cache/huggingface:/root/.cache/huggingface \
            -e VLLM_CPU_KVCACHE_SPACE=4 \
            docker.io/vllm/vllm-openai-cpu:v0.24.0 \
            --model RedHatAI/gemma-3-1b-it-quantized.w8a8 \
            --max-model-len 4096
          docker logs -f vllm-server &
          LOGS_PID=$!
          echo "Waiting for vLLM health endpoint..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "vLLM ready (after ${i}x5s)"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "vLLM failed to start within 450s"
              kill $LOGS_PID 2>/dev/null || true
              exit 1
            fi
            sleep 5
          done
          kill $LOGS_PID 2>/dev/null || true
          sudo chown -R $(id -u):$(id -g) ~/.cache/huggingface
      - name: Run LLM integration tests
        env:
          LLM_BASE_URL: "http://localhost:8000/v1"
          LLM_MODEL: "RedHatAI/gemma-3-1b-it-quantized.w8a8"
        run: uv run pytest --test-llm -m llm -v --timeout=120
