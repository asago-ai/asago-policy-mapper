name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8 ( longer publishes major/minor tags — SHA pinning is the only supported approach)
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff format --check src/ tests/
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/asago_policy_mapper/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8 ( longer publishes major/minor tags — SHA pinning is the only supported approach)
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run pytest -rs -m "not slow"

  test-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8 ( longer publishes major/minor tags — SHA pinning is the only supported approach)
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run pytest -rs -m slow

  test-llm-ollama:
    runs-on: ubuntu-latest
    env:
      OLLAMA_MODELS: /home/runner/.ollama-models
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Restore Ollama model cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ${{ env.OLLAMA_MODELS }}
          key: ollama-gemma3-1b
      - name: Start Ollama and pull model
        run: |
          sudo systemctl stop ollama 2>/dev/null || true
          ollama serve &
          for i in $(seq 1 30); do curl -sf http://localhost:11434/api/tags >/dev/null && break; sleep 1; done
          ollama pull gemma3:1b
      - name: Run LLM integration tests
        env:
          LLM_BASE_URL: "http://localhost:11434/v1"
          LLM_MODEL: "gemma3:1b"
        run: uv run pytest --test-llm -m llm -v
      - name: Save Ollama model cache
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ${{ env.OLLAMA_MODELS }}
          key: ollama-gemma3-1b

  test-llm-vllm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: Restore HuggingFace models cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/huggingface
          key: hf-qwen2.5-1.5b-instruct
      - name: Restore vLLM torch compile cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/vllm
          key: vllm-compile-qwen2.5-1.5b-v0.24.0-v2
      - name: Start vLLM-CPU server
        run: |
          docker run --rm --detach \
            --name vllm-server \
            --shm-size=4g \
            -p 8000:8000 \
            -v ~/.cache/huggingface:/root/.cache/huggingface \
            -v ~/.cache/vllm:/root/.cache/vllm \
            -e VLLM_CPU_KVCACHE_SPACE=4 \
            -e VLLM_ENABLE_V1_MULTIPROCESSING=0 \
            docker.io/vllm/vllm-openai-cpu:v0.24.0 \
            --model Qwen/Qwen2.5-1.5B-Instruct \
            --max-model-len 4096 \
            --dtype bfloat16
          docker logs -f vllm-server &
          LOGS_PID=$!
          echo "Waiting for vLLM health endpoint..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "vLLM ready (after ${i}x5s)"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "vLLM failed to start within 450s"
              kill $LOGS_PID 2>/dev/null || true
              exit 1
            fi
            sleep 5
          done
          kill $LOGS_PID 2>/dev/null || true
      - name: Run LLM integration tests
        env:
          LLM_BASE_URL: "http://localhost:8000/v1"
          LLM_MODEL: "Qwen/Qwen2.5-1.5B-Instruct"
        run: uv run pytest --test-llm -m llm -v
      - name: Fix cache directory permissions
        if: always()
        run: |
          sudo chown -R $(id -u):$(id -g) ~/.cache/huggingface 2>/dev/null || true
          sudo chown -R $(id -u):$(id -g) ~/.cache/vllm 2>/dev/null || true
      - name: Save HuggingFace models cache
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/huggingface
          key: hf-qwen2.5-1.5b-instruct
      - name: Save vLLM torch compile cache
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/vllm
          key: vllm-compile-qwen2.5-1.5b-v0.24.0-v2
